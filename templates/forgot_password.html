<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom styling for form.as_p fields to match editorial look */
        .form-container p {
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
        }
        .form-container input {
            background-color: transparent;
            border: none;
            border-bottom: 1px solid rgba(134, 120, 106, 0.3);
            padding: 0.75rem 0;
            font-family: 'Sora', sans-serif;
            font-size: 1rem;
            transition: border-color 0.3s ease;
            outline: none;
        }
        .form-container input:focus {
            border-bottom: 2px solid #80571f;
            box-shadow: none;
            outline: none;
        }
        .form-container label {
            font-family: 'Literata', serif;
            font-size: 0.875rem;
            color: #6a5d50;
            margin-bottom: 0.25rem;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface-container-low text-on-surface selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col">
<!-- Top Navigation Shell -->
<nav class="fixed top-0 w-full z-50 bg-[#fff9ef]/80 dark:bg-[#1d1b16]/80 backdrop-blur-md flex items-center justify-between px-6 py-4 w-full">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#7c5454] dark:text-[#eab77a]" data-icon="arrow_back">arrow_back</span>
</div>
<div class="absolute left-1/2 -translate-x-1/2">
<span class="font-serif text-2xl italic text-[#1d1b16] dark:text-[#fff9ef]">Nocturne</span>
</div>
<div class="w-6"></div> <!-- Spacer for balance -->
</nav>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-6 pt-24 pb-12">
<div class="max-w-md w-full text-center space-y-12">
<!-- Hero Header Section -->
<header class="space-y-4">
<h1 class="font-headline text-5xl md:text-6xl text-on-surface tracking-tight leading-tight">
                    Forgot Your Password?
                </h1>
<p class="font-body text-on-surface-variant max-w-[28ch] mx-auto leading-relaxed opacity-80">
                    Enter your email, and we will send you a link to restore access.
                </p>
</header>
<!-- Book-like Form Layout -->
<section class="bg-surface-container-lowest p-8 md:p-12 shadow-[0_4px_32px_rgba(59,49,37,0.05)] rounded-sm border border-outline-variant/10">
<form action="" class="form-container text-left" method="POST">
<!-- Django CSRF Token Placeholder -->
<input name="csrfmiddlewaretoken" type="hidden" value="{% csrf_token %}"/>
<!-- Simulating {{ form.as_p }} with the requested minimal underline design -->
<p>
<label for="id_email">Email Address</label>
<input id="id_email" name="email" placeholder="poet@nocturne.ink" required="" type="email"/>
</p>
<div class="pt-4">
<button class="w-full py-4 bg-primary text-on-primary font-label tracking-wide text-sm rounded-sm hover:opacity-90 transition-opacity uppercase duration-300" type="submit">
                            Send Reset Link
                        </button>
</div>
</form>
</section>
<!-- Bottom Navigation Cluster -->
<footer class="pt-4">
<a class="inline-flex items-center gap-2 font-label text-sm text-secondary hover:text-primary transition-colors" href="/login">
<span class="material-symbols-outlined text-[18px]" data-icon="keyboard_backspace">keyboard_backspace</span>
                    Back to login
                </a>
</footer>
</div>
</main>
<!-- Visual Anchor: Atmospheric Imagery -->
<div class="fixed bottom-0 right-0 w-64 h-64 opacity-10 pointer-events-none -z-10 translate-x-1/4 translate-y-1/4">
<img alt="faded open book" class="w-full h-full object-contain grayscale" data-alt="a vintage open book with yellowed pages lying on a rustic wooden table with soft dramatic morning light" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB6QEA2qCW_E8VRkGG9iZqe56AH7Crh5uPG0GHvbqbrpaqbhJNWkVczhlbVFq0NdrjNQxKIJX7Dbxd_QzShcWJ1anM395zCLDIi6NRDDdmGQBML3QdO9eoPdM5C21SF-AKiA8mSwelBGYqZeKm91vjqEyjlMA-eKcI-Syco94_boR_UM4fxe0XNpccK-kxhUu3467AfzCfv0cyeLS5jLZsHxKiLo08zOk_AnICc3qzswwLdFBXLCef7FC3BsiJD4AlOmXb2ZCW7tsA"/>
</div>
<!-- Universal Footer Component -->
<footer class="bg-[#f9f3ea] dark:bg-[#1d1b16] w-full py-12 mt-auto flex flex-col items-center gap-4 w-full px-8">
<div class="font-serif text-lg text-[#1d1b16] dark:text-[#fff9ef]">Nocturne</div>
<div class="flex gap-6">
<a class="text-[#1d1b16]/60 dark:text-[#fff9ef]/60 font-sans text-[12px] uppercase tracking-widest hover:text-[#7c5454] transition-colors" href="#">Privacy</a>
<a class="text-[#1d1b16]/60 dark:text-[#fff9ef]/60 font-sans text-[12px] uppercase tracking-widest hover:text-[#7c5454] transition-colors" href="#">Terms</a>
<a class="text-[#1d1b16]/60 dark:text-[#fff9ef]/60 font-sans text-[12px] uppercase tracking-widest hover:text-[#7c5454] transition-colors" href="#">Support</a>
</div>
<p class="text-[#1d1b16]/60 dark:text-[#fff9ef]/60 font-sans text-[10px] uppercase tracking-widest mt-4">
            © 2024 Nocturne. All verses reserved.
        </p>
</footer>
