<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Forgot Password | Poems With AD</title>
<!-- Google Fonts: EB Garamond for Serif, Sora for Body, Literata for Labels -->

<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "outline-variant": "#bfafa0",
              "inverse-surface": "#120d08",
              "on-primary": "#fff7f3",
              "surface-container-lowest": "#ffffff",
              "secondary-fixed": "#fcddbd",
              "secondary-fixed-dim": "#edcfaf",
              "on-tertiary": "#f6ffbc",
              "surface-container": "#fbebdd",
              "on-tertiary-fixed": "#484f1e",
              "tertiary": "#5c6330",
              "on-tertiary-container": "#5a612e",
              "tertiary-container": "#f4fcba",
              "tertiary-dim": "#505725",
              "on-surface-variant": "#6a5d50",
              "primary-container": "#fcc582",
              "inverse-on-surface": "#a59b92",
              "inverse-primary": "#fcc582",
              "on-surface": "#3b3125",
              "surface-bright": "#fff8f4",
              "on-secondary": "#fff7f3",
              "primary": "#80571f",
              "on-secondary-container": "#634e35",
              "error-dim": "#791903",
              "tertiary-fixed": "#f4fcba",
              "primary-fixed-dim": "#edb776",
              "primary-dim": "#724b14",
              "on-tertiary-fixed-variant": "#656c38",
              "error": "#a73b21",
              "on-primary-fixed-variant": "#6d470f",
              "on-background": "#3b3125",
              "error-container": "#fd795a",
              "secondary-dim": "#654f36",
              "on-primary-fixed": "#492c00",
              "surface-container-high": "#f6e5d7",
              "primary-fixed": "#fcc582",
              "on-secondary-fixed-variant": "#6e583e",
              "secondary-container": "#fcddbd",
              "surface": "#fff8f4",
              "surface-dim": "#e9d7c6",
              "tertiary-fixed-dim": "#e6eead",
              "background": "#fff8f4",
              "surface-container-highest": "#f1e0cf",
              "on-error": "#fff7f6",
              "secondary": "#715b41",
              "on-secondary-fixed": "#4f3c24",
              "surface-container-low": "#fff1e5",
              "on-error-container": "#6e1400",
              "on-primary-container": "#623e06",
              "surface-variant": "#f1e0cf",
              "surface-tint": "#80571f",
              "outline": "#86786a"
            },
            fontFamily: {
              "headline": ["EB Garamond"],
              "body": ["Sora"],
              "label": ["Literata"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body {
            background-color: #fff9ef; /* Custom warm background from prompt */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body text-on-surface min-h-screen flex flex-col">
<!-- Top Navigation Anchor -->
<header class="w-full top-0 sticky bg-[#fff9ef] dark:bg-[#1d1b16] flex items-center justify-between px-6 py-4 w-full z-10">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#7c5454] dark:text-[#eab77a]" data-icon="arrow_back">arrow_back</span>
<span class="font-serif text-2xl text-[#1d1b16] dark:text-[#fff9ef]">Poems With AD</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-4 py-12">
<div class="max-w-lg w-full">
<!-- Branding/Identity Section -->
<div class="text-center mb-12">
<h1 class="font-headline text-5xl italic tracking-tight text-on-surface mb-4">Recover your voice.</h1>
<p class="font-label text-on-surface-variant italic text-lg opacity-80">
                    "Yesterday I was clever, so I wanted to change the world. Today I am wise, so I am changing myself."
                </p>
</div>
<!-- Focused Transactional Card -->
<div class="bg-surface-container-low p-10 md:p-14 rounded-sm border-none transition-all duration-500 hover:bg-surface-container">
<form action="#" class="space-y-10" method="POST">
<!-- Django template variable placeholder logic -->
                    {% csrf_token %}
                    
                    <div class="space-y-2">
<label class="font-label text-xs uppercase tracking-[0.2em] text-on-surface-variant block ml-1" for="id_email">
                            Email Address
                        </label>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b border-outline-variant/30 px-1 py-3 focus:ring-0 focus:border-primary transition-colors duration-300 font-headline text-xl placeholder:italic placeholder:text-on-surface-variant/40" id="id_email" name="email" placeholder="the.poet@Poems With AD.com" required="" type="email"/>
</div>
<!-- Django fallback container -->
<div class="django-form-content">
                        {{ form.as_p }}
                    </div>
<div class="pt-4 flex flex-col items-center gap-8">
<button class="w-full bg-[#7c5454] text-on-primary py-5 rounded-sm font-label text-sm uppercase tracking-widest hover:bg-primary-dim transition-all duration-300 active:scale-95 shadow-sm" type="submit">
                            Reset Password
                        </button>
<a class="group flex items-center gap-2 font-label text-sm text-on-surface-variant hover:text-primary transition-colors duration-300" href="/login/">
<span class="material-symbols-outlined text-sm group-hover:-translate-x-1 transition-transform" data-icon="arrow_left_alt">arrow_left_alt</span>
                            Back to Login
                        </a>
</div>
</form>
</div>
<!-- Ambient Decorative Element -->
<div class="mt-24 flex justify-center opacity-10">
<div class="w-px h-24 bg-on-surface"></div>
</div>
<!-- Footer Quote / Literary Context -->
<footer class="mt-12 text-center">
<div class="flex flex-col items-center gap-4">
<div class="w-32 h-40 overflow-hidden rounded-sm grayscale opacity-30">
<img alt="Manuscript texture" class="w-full h-full object-cover" data-alt="Close-up of old weathered parchment paper with faint ink stains and delicate texture, historical literary aesthetic" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA7ZBa8_7GeeGfdfZWxn5vmTIP9CcVnvqTdBNaX7mXsuT-iweciFWdt4nmILJLSscc4jmk6d7qCOnp0OlJpzSjIu-p95Kz5GvQY5yNsKGOPP8DbfdKHisJCXNW6vcMebavcjh5lt5iaQQP4fciWxu33XoPby-sj5_sLgNsuMHej13FKdvMIxW9eH2M8tYbRxW2J_Sp6XRgLPB7LX8j8FuW8TCLXuKflR1GlOrZ04L8E3lfRA4-24Bv0O-z4iqJ1zygkGg-6Nx75bPM"/>
</div>
<p class="font-headline italic text-on-surface-variant max-w-xs mx-auto text-sm leading-relaxed">
                        May your password be forgotten, but never your rhythm.
                    </p>
</div>
</footer>
</div>
</main>
<!-- Navigation Shell Suppression: Per instructions, we hide global nav on transactional pages. -->
<!-- BottomNavBar would be here but is suppressed for focus. -->
</body></html>
