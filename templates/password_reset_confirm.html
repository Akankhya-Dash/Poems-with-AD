</div>
<!-- Transactional Card: Tonal Stacking instead of Borders -->
<div class="bg-surface-container-low p-8 md:p-12 shadow-sm relative overflow-hidden group">
<!-- Silk Aesthetic Accent -->
<div class="absolute top-0 left-0 w-1 h-full bg-gradient-to-b from-primary/20 via-primary/5 to-transparent"></div>
<div class="relative">
<header class="mb-10">
<h1 class="font-headline text-4xl md:text-5xl text-on-surface mb-4 leading-tight">Set a New Password</h1>
<p class="font-manrope text-on-surface-variant text-lg leading-relaxed font-light italic">
                            Your journey continues. Choose a strong new password to protect your sanctuary.
                        </p>
</header>
<!-- Functional Django Form Shell -->
<form action="." class="space-y-10" method="POST">
<!-- {% csrf_token %} -->
<!-- New Password Field -->
<div class="relative group">
<label class="block font-manrope text-sm uppercase tracking-widest text-on-surface-variant/70 mb-2 transition-colors group-focus-within:text-primary">
                                New Password
                            </label>
<!-- Django Form Variable: {{ form.new_password }} replaced with mock for design -->
<input class="w-full bg-transparent border-0 border-b border-outline-variant/40 py-3 px-0 focus:ring-0 focus:border-primary transition-all duration-500 font-manrope text-lg placeholder:text-on-surface-variant/30 placeholder:italic" name="new_password" placeholder="the_words_unspoken" type="password"/>
<div class="absolute bottom-0 left-0 w-0 h-0.5 bg-primary transition-all duration-700 group-focus-within:w-full"></div>
</div>
<!-- Confirm Password Field -->
<div class="relative group">
<label class="block font-manrope text-sm uppercase tracking-widest text-on-surface-variant/70 mb-2 transition-colors group-focus-within:text-primary">
                                Confirm Password
                            </label>
<!-- Django Form Variable: {{ form.confirm_password }} replaced with mock for design -->
<input class="w-full bg-transparent border-0 border-b border-outline-variant/40 py-3 px-0 focus:ring-0 focus:border-primary transition-all duration-500 font-manrope text-lg placeholder:text-on-surface-variant/30 placeholder:italic" name="confirm_password" placeholder="repeat_the_vow" type="password"/>
<div class="absolute bottom-0 left-0 w-0 h-0.5 bg-primary transition-all duration-700 group-focus-within:w-full"></div>
</div>
<!-- Actions -->
<div class="pt-6 flex flex-col items-center space-y-6">
<button class="w-full bg-primary text-on-primary py-4 px-8 rounded-sm font-headline text-xl tracking-wide hover:bg-primary-dim active:scale-[0.98] transition-all duration-300 relative overflow-hidden group shadow-md shadow-on-surface/5" type="submit">
<span class="relative z-10">Reset Password</span>
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
</button>
<a class="font-manrope text-on-surface-variant/60 text-sm hover:text-primary transition-colors duration-300 border-b border-transparent hover:border-primary/30 pb-1" href="/login">
                                Cancel and return to login
                            </a>
