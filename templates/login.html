    border: none;
    border-bottom: 1px solid rgba(131, 116, 115, 0.2);

    padding-right: 0

<body class="font-body text-on-surface selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col items-center justify-center p-6">
<header class="fixed top-0 w-full z-50 bg-[#fff9ef]/80 backdrop-blur-xl flex items-center justify-center px-8 py-8 w-full">
<div class="font-headline italic text-primary text-2xl tracking-tighter">Poems with AD</div>
</header>
<main class="w-full max-w-[480px] mt-16 mb-24">
<div class="text-center mb-16 space-y-4">
<h1 class="font-headline text-4xl md:text-5xl text-on-surface tracking-tight">Return to your shelf</h1>
<p class="font-headline italic text-on-surface-variant text-lg">“What you seek is seeking you.”</p>
</div>
<div class="bg-surface-container-lowest/40 backdrop-blur-md p-10 md:p-14 shadow-[0_32px_64px_-12px_rgba(29,27,22,0.08)] relative overflow-hidden">
<div class="absolute top-0 left-0 w-1 h-full bg-primary/20"></div>
<form action="{% url 'login' %}" class="space-y-10" method="POST">
    {% csrf_token %}
<div class="space-y-8">
<div class="flex flex-col gap-2">
<label class="font-label text-xs uppercase tracking-widest text-on-surface-variant/60">Username</label>
<input class="ghost-border-input w-full py-3 italic text-on-surface placeholder:text-on-surface-variant/40" name="username" placeholder="the_lonely_poet" type="text"/>
</div>
<div class="flex flex-col gap-2">
<label class="font-label text-xs uppercase tracking-widest text-on-surface-variant/60">Passage Key</label>
<input class="ghost-border-input w-full py-3 italic text-on-surface placeholder:text-on-surface-variant/40" name="password" placeholder="The silent word..." type="password"/>
</div>
</div>
<div class="flex items-center justify-between pt-4">
<label class="flex items-center gap-3 cursor-pointer group">
<input class="w-4 h-4 rounded-sm border-outline-variant text-primary focus:ring-primary/20 bg-transparent" type="checkbox"/>
<span class="font-label text-xs text-on-surface-variant group-hover:text-primary transition-colors">Keep the candle lit</span>
</label>
<a class="font-label text-xs text-on-surface-variant hover:text-primary transition-colors" href="{% url 'password_reset' %}">Forgot key?</a>
</div>
<button class="w-full bg-primary text-on-primary py-4 font-label tracking-widest uppercase text-sm rounded-sm hover:opacity-90 active:scale-[0.98] transition-all shadow-sm" type="submit">
                    Enter your Journey
                </button>
</form>
<input type="hidden" name="next" value="{{ next }}">
<div class="mt-12 text-center">
<p class="text-on-surface-variant text-sm font-body">
                    A new traveler? 
                    <a class="text-primary font-bold ml-2 underline underline-offset-8 decoration-primary/30 hover:decoration-primary transition-all" href="{% url 'signup' %}">Join the circle</a>
</p>
</div>
</div>
<div class="mt-16 flex justify-center items-center gap-6">
<div class="h-[1px] w-12 bg-outline-variant/30"></div>
<span class="material-symbols-outlined text-outline-variant text-lg">menu_book</span>
<div class="h-[1px] w-12 bg-outline-variant/30"></div>
</div>
</main>
<footer class="fixed bottom-12 w-full text-center">
<p class="text-[10px] font-label uppercase tracking-[0.3em] text-on-surface-variant/40 px-6">
            Designed for the quiet moments © 2026 
            AD's memory lane
        </p>
</footer>
<div class="fixed top-0 left-0 w-full h-full pointer-events-none opacity-[0.03] mix-blend-multiply z-[-1]" data-alt="Subtle aged paper texture overlay" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAKpPt2We0QaghwsbPCzbBf7qig9D4nj0q1OOFDyoI4LNLOfDMvGUrOOHXO_YGxbl4gtCpuKzwLeL2AjrDTyB82yUNgIRQewGJfgVYShst1u6lr7pnqb1WnlM7HMNGflBe4N83_6uL71xwki5CRFZm_R1DOg9WzVl9EN1Sed96KC7qJbo1UxxBlq9TdTV811WWTmdw8cw91ZMy7RN21Ok7lYaZquL-2Y78B1sNXViAUlwOtyGjIr7D_MPJn-mdJlr09jzIA8OT7xPg');">
